version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - bodyclose
    - dogsled
    - errcheck
    - funlen
    - forbidigo
    - goconst
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    forbidigo:
      forbid:
        - pattern: ^os\.Exit$
    funlen:
      lines: 150
      statements: 80
    goconst:
      min-len: 3
      min-occurrences: 4
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    govet:
      enable-all: true
      disable:
        - fieldalignment
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
  exclusions:
    rules:
      - path: (^|/)(cmd|scripts)/|_test\.go$
        linters:
          - forbidigo
      - path: _test\.go
        linters:
          - funlen
          - goconst
          - gocritic
          - unparam
      - path: internal/promptsheon/
        linters:
          - gocritic
      - linters:
          - revive
        text: "exported.*should have comment or be unexported"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

severity:
  default: warning
  rules:
    - linters:
        - errcheck
      severity: error
    - linters:
        - govet
      severity: error
    - linters:
        - staticcheck
      severity: error

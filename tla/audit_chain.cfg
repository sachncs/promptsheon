\* tla/audit_chain.cfg
\*
\* TLC configuration for the audit-chain spec. The model
\* checker verifies the ordering invariants on a small finite
\* state space. The set sizes are deliberately tiny — the
\* spec's purpose is to pin the ordering invariant, not to
\* exercise realistic fan-in.
\*
\* MaxLen bounds the entry sequence so the model is finite.
\* Two writers + three payloads + MaxLen=2 is the smallest
\* model that exercises:
\*   - a single-writer happy path (Prepare / Commit)
\*   - two writers racing (one commits, the other must
\*     StaleAbort or RePrepare; the stale guard in
\*     CommitEntry forbids the old tail from being committed)
\*   - a reader verifying the chain end-to-end

SPECIFICATION Spec

CONSTANTS
    Entries = {e1, e2, e3}
    Writers = {primary, replica}
    MaxLen = 2

INVARIANTS
    TypeOK
    ContiguousLinkedChain
    TailAgreement
    VerificationSoundness
    AllStagedRespectPrev

CHECK_DEADLOCK FALSE

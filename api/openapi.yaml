  /ready:
    get:
      summary: "handleReady returns 200 only when every downstream the daemon\ndepends on for correct operation is reachable:\n\n  - The SQLite database responds to Ping (operator's data).\n  - The OTel tracer is reachable (the daemon otherwise can't\n    ship traces to the operator's collector; failures here\n    will not stall the request path but they do mean the\n    observability story is broken).\n  - The audit worker queue has room (degraded audit means\n    we may be losing entries; the queue depth is exposed\n    so K8s readiness can shed traffic before drops begin).\n\nA failed probe returns 503 with a body naming the failing\ncomponent so operators can triage from the kubelet log\nwithout digging through the daemon log."
      security: []
      responses:
        "200":
          description: OK
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
        "404":
          description: Not found
  /readyz:
    get:
      summary: "handleReady returns 200 only when every downstream the daemon\ndepends on for correct operation is reachable:\n\n  - The SQLite database responds to Ping (operator's data).\n  - The OTel tracer is reachable (the daemon otherwise can't\n    ship traces to the operator's collector; failures here\n    will not stall the request path but they do mean the\n    observability story is broken).\n  - The audit worker queue has room (degraded audit means\n    we may be losing entries; the queue depth is exposed\n    so K8s readiness can shed traffic before drops begin).\n\nA failed probe returns 503 with a body naming the failing\ncomponent so operators can triage from the kubelet log\nwithout digging through the daemon log."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/object"
        "400":

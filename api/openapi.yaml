openapi: "3.0.3"
info:
  title: Promptsheon API
  description: Version Control System for AI agent intelligence
  version: "1.0.0"
  contact:
    name: Promptsheon

servers:
  - url: http://localhost:8080
    description: Local development

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "API key prefixed with ps_. Send as: Authorization: Bearer ps_..."

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    Prompt:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        content:
          type: string
        variables:
          type: array
          items:
            $ref: "#/components/schemas/Variable"
        tags:
          type: array
          items:
            type: string
        model_hint:
          type: string
        binding:
          $ref: "#/components/schemas/ProviderBinding"
        version:
          type: integer
        status:
          type: string
          enum: [draft, approved, deployed, archived]
        cas_hash:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties:
            type: string

    Variable:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        required:
          type: boolean
        default:
          type: string
        description:
          type: string

    ProviderBinding:
      type: object
      properties:
        provider:
          type: string
          description: "LLM provider name (e.g. openai, azure, anthropic)"
        model:
          type: string
          description: "Model identifier (e.g. gpt-4, claude-3-opus)"
        api_key_ref:
          type: string
          description: "Vault key ID for API key lookup"

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/AgentStep"
        tools:
          type: array
          items:
            $ref: "#/components/schemas/ToolRef"
        status:
          type: string
        cas_hash:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentStep:
      type: object
      properties:
        id:
          type: string
        prompt_id:
          type: string
        prompt_hash:
          type: string
        depends_on:
          type: array
          items:
            type: string
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
        output_key:
          type: string

    ToolRef:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [http, shell, json_transform, prompt_call]
        config:
          type: object

    ToolCall:
      type: object
      properties:
        tool:
          type: string
        input:
          type: object
        output:
          type: object
        error:
          type: string
        latency_ms:
          type: integer

    TestDataset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        cases:
          type: array
          items:
            $ref: "#/components/schemas/TestCase"
        created_by:
          type: string
        created_at:
          type: string
          format: date-time

    TestCase:
      type: object
      properties:
        id:
          type: string
        input:
          type: object
        expected_output:
          type: string
        expected_contains:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    EvalResult:
      type: object
      properties:
        id:
          type: string
        test_case_id:
          type: string
        prompt_hash:
          type: string
        dataset_id:
          type: string
        model:
          type: string
        output:
          type: string
        score:
          type: number
        latency_ms:
          type: integer
        token_usage:
          $ref: "#/components/schemas/Usage"
        hallucination_score:
          type: number
        passed:
          type: boolean
        error:
          type: string
        created_at:
          type: string
          format: date-time

    Usage:
      type: object
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer

    EvalReport:
      type: object
      properties:
        prompt_hash:
          type: string
        dataset_id:
          type: string
        model:
          type: string
        results:
          type: array
          items:
            $ref: "#/components/schemas/EvalResult"
        aggregate:
          $ref: "#/components/schemas/Aggregate"
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    Aggregate:
      type: object
      properties:
        total_cases:
          type: integer
        passed_cases:
          type: integer
        pass_rate:
          type: number
        avg_score:
          type: number
        avg_latency_ms:
          type: number
        avg_hallucination:
          type: number
        total_tokens:
          type: integer

    Review:
      type: object
      properties:
        id:
          type: string
        resource_id:
          type: string
        resource_type:
          type: string
        author:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        content:
          type: string
        created_at:
          type: string
          format: date-time

    AuditEntry:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        action:
          type: string
        resource:
          type: string
        details:
          type: object
        timestamp:
          type: string
          format: date-time
        previous_hash:
          type: string
          description: "Hash of the previous audit entry (for chain verification)"
        entry_hash:
          type: string
          description: "Hash of this entry (for chain verification)"

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, writer, reader]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    APIKey:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        name:
          type: string
        key_prefix:
          type: string
        role:
          type: string
        expires_at:
          type: string
          format: date-time
        last_used:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        revoked:
          type: boolean

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
                  uptime:
                    type: string

  /ready:
    get:
      summary: Readiness check
      tags: [System]
      security: []
      responses:
        "200":
          description: Ready

  /api/v1/apikeys:
    post:
      summary: Create API key
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, name, role]
              properties:
                user_id:
                  type: string
                name:
                  type: string
                role:
                  type: string
                  enum: [admin, writer, reader]
                expires_at:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Key created (key shown once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                  record:
                    $ref: "#/components/schemas/APIKey"
    get:
      summary: List API keys for a user
      tags: [Auth]
      security: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIKey"

  /api/v1/apikeys/{id}:
    delete:
      summary: Revoke API key
      tags: [Auth]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Revoked

  /api/v1/auth/{provider}/login:
    get:
      summary: Initiate OAuth login
      tags: [Auth]
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github]
      responses:
        "302":
          description: Redirect to OAuth provider

  /api/v1/auth/{provider}/callback:
    get:
      summary: OAuth callback
      tags: [Auth]
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, github]
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  key:
                    type: string

  /api/v1/users:
    get:
      summary: List users
      tags: [Users]
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      summary: Create user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, name]
              properties:
                email:
                  type: string
                name:
                  type: string
                role:
                  type: string
                  enum: [admin, writer, reader]
                  default: reader
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /api/v1/users/{id}:
    get:
      summary: Get user
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      summary: Update user
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
                role:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      summary: Delete user
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /api/v1/prompts:
    get:
      summary: List prompts
      tags: [Prompts]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Prompt list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prompt"
    post:
      summary: Create prompt
      tags: [Prompts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, content]
              properties:
                name:
                  type: string
                description:
                  type: string
                content:
                  type: string
                variables:
                  type: array
                  items:
                    $ref: "#/components/schemas/Variable"
                tags:
                  type: array
                  items:
                    type: string
                model_hint:
                  type: string
                metadata:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"

  /api/v1/prompts/{id}:
    get:
      summary: Get prompt
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"
    put:
      summary: Update prompt
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                content:
                  type: string
                variables:
                  type: array
                  items:
                    $ref: "#/components/schemas/Variable"
                tags:
                  type: array
                  items:
                    type: string
                model_hint:
                  type: string
                status:
                  type: string
                metadata:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"
    delete:
      summary: Delete prompt
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /api/v1/prompts/{id}/deploy:
    post:
      summary: Deploy an approved prompt
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deployed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"

  /api/v1/prompts/{id}/archive:
    post:
      summary: Archive a prompt
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prompt"

  /api/v1/prompts/{id}/run:
    post:
      summary: Run a prompt via LLM
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                variables:
                  type: object
                  additionalProperties:
                    type: string
                provider:
                  type: string
                model:
                  type: string
      responses:
        "200":
          description: LLM response
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
                  model:
                    type: string
                  usage:
                    $ref: "#/components/schemas/Usage"
                  latency_ms:
                    type: integer

  /api/v1/prompts/{id}/preview:
    post:
      summary: Preview a prompt without executing
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                variables:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Preview result
          content:
            application/json:
              schema:
                type: object
                properties:
                  rendered:
                    type: string
                    description: Prompt with variables substituted
                  estimated_tokens:
                    type: integer
                  estimated_cost:
                    type: number
                    format: double
                  variables_used:
                    type: object
                    additionalProperties:
                      type: string

  /api/v1/agents:
    get:
      summary: List agents
      tags: [Agents]
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      summary: Create agent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                steps:
                  type: array
                  items:
                    $ref: "#/components/schemas/AgentStep"
                tools:
                  type: array
                  items:
                    $ref: "#/components/schemas/ToolRef"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /api/v1/agents/{id}:
    get:
      summary: Get agent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    put:
      summary: Update agent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                steps:
                  type: array
                  items:
                    $ref: "#/components/schemas/AgentStep"
                tools:
                  type: array
                  items:
                    $ref: "#/components/schemas/ToolRef"
                status:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
    delete:
      summary: Delete agent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /api/v1/agents/{id}/export:
    get:
      summary: Export agent
      tags: [Agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [json, yaml]
      responses:
        "200":
          description: Agent in requested format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
            application/x-yaml:
              schema:
                type: string

  /api/v1/agents/import-yaml:
    post:
      summary: Import agent from YAML
      tags: [Agents]
      requestBody:
        required: true
        content:
          text/yaml:
            schema:
              type: string
      responses:
        "201":
          description: Imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /api/v1/datasets:
    get:
      summary: List datasets
      tags: [Datasets]
      responses:
        "200":
          description: Dataset list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestDataset"
    post:
      summary: Create dataset
      tags: [Datasets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                cases:
                  type: array
                  items:
                    $ref: "#/components/schemas/TestCase"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestDataset"

  /api/v1/datasets/{id}:
    get:
      summary: Get dataset
      tags: [Datasets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dataset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestDataset"
    put:
      summary: Update dataset
      tags: [Datasets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                cases:
                  type: array
                  items:
                    $ref: "#/components/schemas/TestCase"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestDataset"
    delete:
      summary: Delete dataset
      tags: [Datasets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /api/v1/datasets/import:
    post:
      summary: Import dataset
      tags: [Datasets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                cases:
                  type: array
                  items:
                    $ref: "#/components/schemas/TestCase"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestDataset"

  /api/v1/datasets/{id}/import-csv:
    post:
      summary: Import CSV test cases
      tags: [Datasets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [csv]
              properties:
                csv:
                  type: string
                  description: CSV string with header row
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  cases_added:
                    type: integer
                  total_cases:
                    type: integer

  /api/v1/datasets/{id}/export:
    get:
      summary: Export dataset as NDJSON
      tags: [Datasets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: NDJSON test cases
          content:
            application/x-ndjson:
              schema:
                type: string

  /api/v1/reviews:
    get:
      summary: List pending reviews
      tags: [Reviews]
      responses:
        "200":
          description: Review list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      summary: Create review
      tags: [Reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resource_id, resource_type, author]
              properties:
                resource_id:
                  type: string
                resource_type:
                  type: string
                author:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:

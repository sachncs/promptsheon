version: 2

# OSS-REL: a single `release:` block. The previous config
# had two (one at the top, one re-declared at the bottom to
# attach SBOM extra_files). The two-block form is invalid
# YAML for `release:` in goreleaser v2 and the second block
# silently shadowed the first; the SBOM extra_files below
# are the only thing that actually needed declaring.
#
# The four SBOM signature/cert globs
# (sbom.cyclonedx.json.{sig,pem}, sbom.spdx.json.{sig,pem})
# were stale: the `signs:` block below signs the release
# archives and the checksum file next to themselves — it
# does not sign the SBOM. Those paths were never produced.
release:
  github:
    owner: sachncs
    name: promptsheon
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  extra_files:
    - glob: ./dist/sbom/sbom.cyclonedx.json
    - glob: ./dist/sbom/sbom.spdx.json

builds:
  - id: promptsheond
    main: ./cmd/promptsheond
    binary: promptsheond
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/sachncs/promptsheon/internal/buildinfo.Version={{.Version}}
      - -X github.com/sachncs/promptsheon/internal/buildinfo.Commit={{.Commit}}
      - -X github.com/sachncs/promptsheon/internal/buildinfo.BuildTime={{.CommitDate}}

  - id: promptsheon-cli
    main: ./cmd/promptsheon
    binary: promptsheon
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/sachncs/promptsheon/internal/buildinfo.Version={{.Version}}
      - -X github.com/sachncs/promptsheon/internal/buildinfo.Commit={{.Commit}}
      - -X github.com/sachncs/promptsheon/internal/buildinfo.BuildTime={{.CommitDate}}

archives:
  - id: promptsheond
    ids:
      - promptsheond
    name_template: "promptsheond_{{.Version}}_{{.Os}}_{{.Arch}}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: promptsheon-cli
    ids:
      - promptsheon-cli
    name_template: "promptsheon_{{.Version}}_{{.Os}}_{{.Arch}}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

# SEC-16a: cosign keyless signing of the checksum file using
# the documented `cosign sign-blob --bundle=...` shape:
#   - artifacts: checksum targets the checksums.txt that the
#     checksum: block above emits (signed once for the whole
#     release instead of once per archive);
#   - args list every flag and positional so a future cosign
#     flag-removal is caught at CI lint time, not at release
#     time;
#   - --bundle=${signature} tells cosign to write the bundle
#     to the path goreleaser supplied, so no second-file plumbing
#     is needed;
#   - output is omitted (defaults to true): the bundle is the
#     only output we care about and it already lands at
#     ${signature}.
signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

# dockers_v2 (the v2-only successor to `docker_images`) ships
# a multi-arch promptsheond image to GHCR on every tagged
# release. The Dockerfile.goreleaser next to this file is a
# minimal runtime image that COPYs the binary GoReleaser has
# already built for the target platform — it does NOT rebuild
# from source (the multi-stage build in Dockerfile is the
# `docker build` path, not the goreleaser path; the two have
# different build contexts).
#
# Tags: v<version> always; `:latest` only on stable releases
# (not prereleases, not nightly snapshots). The `snapshot:`
# block above disables --snapshot mode, but nightly tags would
# still produce a stale `:latest` if the conditional were
# missing — both gates are required.
dockers_v2:
  - id: promptsheond
    ids:
      - promptsheond
    dockerfile: Dockerfile.goreleaser
    images:
      - ghcr.io/{{ .Env.GITHUB_REPOSITORY }}/promptsheond
    tags:
      - "v{{ .Version }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

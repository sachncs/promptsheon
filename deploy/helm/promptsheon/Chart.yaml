apiVersion: v2
name: promptsheon
description: |
  Promptsheon is the Control Plane for AI Capabilities. This chart
  deploys a single-replica daemon with a PVC-backed SQLite database
  by default; production deployments should switch to Postgres
  (PROMPTSHEON_DB_BACKEND=postgres, RLS migrations in
  internal/store/migrations/postgres/).
type: application
version: 0.1.0
appVersion: 0.1.0
keywords:
  - ai
  - capabilities
  - control-plane
  - governance
home: https://github.com/sachncs/promptsheon
sources:
  - https://github.com/sachncs/promptsheon
maintainers:
  - name: Promptsheon Maintainers
    email: maintainers@promptsheon.dev
icon: https://avatars.githubusercontent.com/u/sachn-cs

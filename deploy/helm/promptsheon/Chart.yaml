apiVersion: v2
name: promptsheon
description: |
  Promptsheon is the Control Plane for AI Capabilities. This chart
  deploys a single-replica daemon with a PVC-backed SQLite database;
  vector search is provided by the sqlite-vec extension loaded at
  startup. Multi-replica and Postgres-backed deployments are
  intentionally unsupported until a shared backend is added.
type: application
version: 0.2.0
appVersion: 0.2.0
keywords:
  - ai
  - capabilities
  - control-plane
  - governance
home: https://github.com/sachncs/promptsheon
sources:
  - https://github.com/sachncs/promptsheon
maintainers:
  - name: Promptsheon Maintainers
    email: maintainers@promptsheon.dev
icon: https://promptsheon.dev/logo.svg

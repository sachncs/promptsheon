{{- if eq (.Values.config.dbBackend | default "sqlite") "postgres" }}
{{- /* Postgres deploys publish a managed-secret alias. */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "promptsheon.fullname" . }}-db
  labels:
    {{- include "promptsheon.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-url: {{ required "config.dbDSN required when dbBackend=postgres" .Values.config.dbDSN | quote }}
{{- end }}

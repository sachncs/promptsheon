{{- /*
  Vault key Secret: holds the 32-byte hex AES key used by the daemon
  to encrypt provider keys at rest. The Secret is opt-in; production
  deployments should rotate via a sealed-secrets/ESO workflow rather
  than editing values. The chart never renders a plaintext DSN here;
  database state lives on the PVC mounted into /var/lib/promptsheon.
*/}}
{{- if .Values.vault.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "promptsheon.fullname" . }}-vault
  labels:
    {{- include "promptsheon.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.vault.key }}
  PROMPTSHEON_VAULT_KEY: {{ required "vault.key required when vault.enabled" .Values.vault.key | quote }}
  {{- else }}
  PROMPTSHEON_VAULT_KEY: {{ required "vault.key required when vault.enabled" (randAlphaNum 64) | quote }}
  {{- end }}
{{- end }}

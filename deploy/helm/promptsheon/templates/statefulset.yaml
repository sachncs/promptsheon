apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "promptsheon.fullname" . }}
  labels:
    {{- include "promptsheon.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "promptsheon.fullname" . }}
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "promptsheon.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "promptsheon.selectorLabels" . | nindent 8 }}
      annotations:
        # Force a rollout when the ConfigMap changes so the new env
        # actually takes effect on the running pods.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      automountServiceAccountToken: false
      # OPS-2c: production-grade scheduling.
      # topologySpreadConstraints spreads replicas across
      # availability zones so a single zone failure doesn't
      # take the daemon down. priorityClassName biases
      # scheduling toward critical workloads in clusters
      # where the system-node-critical class is reserved.
      # Both are no-ops when the cluster doesn't define the
      # referenced topology key / priority class.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "promptsheon.selectorLabels" . | nindent 14 }}
      priorityClassName: {{ .Values.priorityClassName | default "system-node-critical" }}
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: promptsheond
          image: "{{ .Values.image.repository | default "promptsheon/promptsheon" }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "promptsheon.fullname" . }}-config
            {{- if .Values.vault.enabled }}
            - secretRef:
                name: {{ include "promptsheon.fullname" . }}-vault
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: {{ .Values.resources.cpuLimit | default "2" }}
              memory: {{ .Values.resources.memoryLimit | default "1Gi" }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/promptsheon
          # Startup probe: gives a fresh pod generous headroom for
          # first-boot migrations and audit-chain verification. The
          # liveness probe only fires after startup succeeds.
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "promptsheon.fullname" . }}-data

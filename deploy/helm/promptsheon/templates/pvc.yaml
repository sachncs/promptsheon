apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "promptsheon.fullname" . }}-data
  labels:
    {{- include "promptsheon.labels" . | nindent 4 }}
spec:
  {{- if .Values.persistence.storageClassName }}
  storageClassName: {{ .Values.persistence.storageClassName | quote }}
  {{- end }}
  accessModes:
    - {{ .Values.persistence.accessMode | default "ReadWriteOnce" | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | default "8Gi" | quote }}

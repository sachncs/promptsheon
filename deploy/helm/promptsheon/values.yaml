# Default values for Promptsheon.
# See values.yaml.example for the full set of knobs.

replicaCount: 1

image:
  repository: promptsheon/promptsheon
  tag: ""  # Default to Chart.AppVersion
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

# resource limits. Requests are deliberately tiny; cap to whatever
# your tenant's per-pod budget allows.
resources:
  cpuLimit: "2"
  memoryLimit: 1Gi

# config knobs land in a ConfigMap and are read by the daemon at
# boot. See internal/config/config.go for every supported env var.
config:
  dbBackend: sqlite
  dbPath: /var/lib/promptsheon/promptsheon.db
  addr: ":8080"
  logLevel: info
  auth: "true"
  rateLimitRate: 100
  rateLimitInterval: 60
  # corsOrigins: ""  # blank is deny-all; set to "*" only for trusted local
  # otelEndpoint: ""  # blank disables OTel

persistence:
  size: 8Gi
  accessMode: ReadWriteOnce
  # storageClassName: ""  # cluster-default

# Optional Prometheus ServiceMonitor (requires the Prometheus
# Operator CRDs).
serviceMonitor:
  enabled: false

# Vault key Secret. When enabled=true the chart renders a Secret
# containing PROMPTSHEON_VAULT_KEY, sourced from .Values.vault.key
# (set this from a sealed-secret/ESO/Vault pipeline, never inline).
vault:
  enabled: false
  key: ""

# Insecure loopback mode. ONLY set to true for single-replica,
# loopback-bound development deployments. Production must leave
# this false and rely on PROMPTSHEON_AUTH=true. The values schema
# rejects replicaCount>1 when this is enabled.
insecureLoopback: false

# Horizontal Pod Autoscaler. Disabled by default because the
# StatefulSet runs a single SQLite writer; multi-replica requires
# leader election on top of a writable PVC per pod. Enable with
# autoscaling.enabled=true once the leader-election layer is
# shipped.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Leader election. When enabled the daemon uses an advisory lock
# in SQLite to elect a single writer; non-leaders stay online
# for reads but refuse writes. Required for replicaCount>1.
leaderElection:
  enabled: false
  ttlSeconds: 30


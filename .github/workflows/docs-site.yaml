name: Docs site

# OPS-CI-3 / DOC-CI-1: build the mdBook site on every push
# to master and on tag, then deploy to the gh-pages branch.
#
# External DNS / custom domain is NOT possible from this
# repository alone. The Pages site is published at
# https://<owner>.github.io/<repo>/ (the default). Operators
# who want a custom domain configure Pages in the repo
# settings UI; this workflow does not write a CNAME file.
#
# Concurrency: when the docs change rapidly, two builds in
# flight would each push to gh-pages; the second clobbers
# the first. The concurrency group below cancels the older
# deploy so the latest build is the one that lands.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install mdBook
        # mdBook is not packaged in the runner image; install
        # the upstream release. The tool is a single static
        # binary; no new repo dependency is added.
        run: |
          set -e
          curl -fsSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin mdbook

      - name: Build site
        # The book lives in docs-site/ (book.toml there points
        # src at ../docs) so the site reuses the existing prose
        # without copy-paste. The only mdBook-only file inside
        # docs/ is SUMMARY.md.
        run: mdbook build docs-site

      - name: Verify build
        # Sanity check: the build directory must contain the
        # index page and at least one chapter.
        run: |
          test -f docs-site/book/index.html
          test -f docs-site/book/getting-started.html
          test -f docs-site/book/architecture.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/book

  deploy:
    # Deploy only on push to master / tag, not on PRs from
    # forks (the action requires write access).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

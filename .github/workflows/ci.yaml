name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -timeout 120s -coverprofile=coverage.out ./...

      - name: gofmt check
        # L-10 fix: enforce gofmt on every PR. The previous CI ran
        # `gofmt -s -w .` only via the local Makefile target, which
        # developers can forget to run. Failing the build on a
        # single gofmt diff is the cheapest way to keep formatting
        # consistent.
        run: |
          if [ "$(gofmt -l . | wc -l)" -ne 0 ]; then
            echo "The following files are not gofmt-clean:"
            gofmt -l .
            exit 1
          fi

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          # M-14 fix: raise the floor from 50% to 70%. The previous
          # threshold was well below industry standards for a
          # security-sensitive gateway and let large packages drift
          # below 30% as long as a few test-heavy packages pulled
          # the average up. 70% is a realistic bar for what is in
          # the repo today.
          if [ $(echo "$COVERAGE < 70" | bc -l) -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi

      - name: Build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Run gosec
        uses: securego/gosec@v2.22.10
        with:
          args: ./...

  sbom:
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: "latest"

      - name: Generate SBOM
        run: |
          syft dir:. -o spdx-json=sbom.spdx.json -o cyclonedx-json=sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json

  build-release:
    runs-on: ubuntu-latest
    needs: [test, lint, security, sbom]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

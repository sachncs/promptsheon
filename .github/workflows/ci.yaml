name: CI

# OPS-9: cancel any in-flight run for the same PR / branch.
# Without this, a fast-followup push triggers a second run
# while the first is still going; the second waits and the
# build matrix doubles. Concurrency cancels the older run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

# OPS-8: default token scopes. Per-job overrides live below
# where a job needs write access (e.g. release:packages).
permissions:
  contents: read

jobs:
  test:
    # OPS-CI-2: run the test matrix against the current
    # go.mod minimum (1.26.5). 1.27 is NOT in the matrix
    # because the repository has not yet bumped its minimum
    # to 1.27 — adding a 1.27 matrix entry here would
    # silently require the runner to have 1.27 installed
    # via setup-go, and the maintainers haven't blessed
    # 1.27 as the new minimum yet. When the go.mod floor
    # moves to 1.27.x, add it to the matrix here.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26.5"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -timeout 120s -coverprofile=coverage.out ./...

      - name: gofmt check
        # L-10 fix: enforce gofmt on every PR. The previous CI ran
        # `gofmt -s -w .` only via the local Makefile target, which
        # developers can forget to run. Failing the build on a
        # single gofmt diff is the cheapest way to keep formatting
        # consistent.
        run: |
          if [ "$(gofmt -l . | wc -l)" -ne 0 ]; then
            echo "The following files are not gofmt-clean:"
            gofmt -l .
            exit 1
          fi

      - name: Check coverage threshold
        # TEST-COV-1 + TEST-COV-2. The global floor is 60%
        # (was 60% aspirational in M-14; the docs/testing.md
        # target was 70% but the realistic bar is 60% because
        # the cmd entry points, examples/, and the OpenAPI
        # generator aren't unit-testable in the conventional
        # sense). We also enforce per-package floors for the
        # testable layers: domain packages (internal/...,
        # excluding cmd/api/store) >= 50%, infrastructure
        # (internal/api + internal/store) >= 40%, api handlers
        # (internal/api) >= 60%. The per-package floors catch
        # silent regressions in the testable surface; the global
        # floor catches regressions in the testable aggregate.
        run: |
          set -e
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if ! awk -v coverage="$COVERAGE" 'BEGIN { exit !(coverage >= 60) }'; then
            echo "Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi
          bash scripts/check-coverage.sh --self-test
          bash scripts/check-coverage.sh coverage.out

      - name: Build
        run: go build ./...

      - name: OpenAPI spec is in sync
        # Item 1 (openapi): CI fails the build if a developer
        # added a route or changed a handler without
        # regenerating api/openapi.yaml. The generator is
        # invoked once on a clean tree and the output is
        # compared to the committed file via git diff.
        run: |
          go run ./scripts/genopenapi
          git diff --exit-code api/openapi.yaml || \
            (echo "api/openapi.yaml is out of date. Run 'make openapi' and commit the result."; exit 1)

      - name: Contract test
        # API-9: the contract test walks every registered
        # OpenAPI route and verifies the SDK surface aligns
        # with the daemon. Fails CI on drift.
        run: go test -count=1 -timeout 60s ./tests/contract/...

      - name: SDK Python codegen + compile
        # API-7a: openapi-python-client regenerates the Python
        # SDK from api/openapi.yaml. compileall catches
        # syntax errors that codegen might emit.
        run: bash sdk/python/scripts/codegen.sh

      - name: SDK TypeScript codegen + typecheck
        # API-7b: openapi-typescript regenerates the TS SDK
        # from api/openapi.yaml. tsc --noEmit catches type
        # errors that codegen might emit.
        run: bash sdk/typescript/scripts/codegen.sh

  smoke:
    # API-6b: smoke-test the example bash scripts against a
    # freshly-started daemon. The job is intentionally its
    # own target (not part of the `test` job) because it
    # builds promptsheond, boots it on a loopback port,
    # runs every examples/bash/*.sh, and tears it down —
    # 6s of wall clock per PR is too much to bolt onto the
    # default test path.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.5"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build promptsheond
        run: go build -o ./promptsheond ./cmd/promptsheond

      - name: Run smoke tests
        run: bash tests/smoke/run.sh

  e2e:
    # TEST-5: end-to-end suite (in-process daemon, real HTTP).
    # The suite exercises the auth + bootstrap paths and
    # lives in tests/e2e/; it runs in ~4s on a clean runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.5"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run e2e suite
        run: go test -race -count=1 -timeout 300s ./tests/e2e/...

  lint:
    runs-on: ubuntu-latest
    # L-12: only-new-issues reads the PR diff from the GitHub
    # API; the default `contents: read` workflow permission is
    # enough for that (no separate pull-requests token is
    # required when the action uses GITHUB_TOKEN, which has
    # implicit read access on PRs the workflow already runs
    # against).
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.5"
          cache: true

      - name: Lint domain packages (no package-level mutable state)
        # CI gate enforcing Charter Principle 5 — domain packages
        # MUST NOT declare package-level mutable state (vars that
        # are not error sentinels or import pins). See ADR-0012.
        run: make lint-domain

      - name: Lint domain-purity (no infra imports from domain packages)
        # CI gate: domain packages depend only on other domain
        # packages and the standard library. They MUST NOT import
        # internal/llm, internal/api, internal/store, or cmd. See
        # ADR-0012.
        run: make lint-deps

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          # L-12: only fail CI on issues introduced by the
          # current change. The repo has a large pre-existing
          # baseline of lint debt (~320 findings across all
          # linters); failing every release for legacy debt
          # would block shippable changes for noise that is
          # not in scope for the current PR. The `forbidigo`
          # rule still checks new non-main os.Exit usage via
          # the same config — only the scope is narrowed to
          # the diff, not the ruleset.
          only-new-issues: true

  docs-check:
    # DOC-CI-3 / DOC-FRESH-1: deterministic doc-freshness gate.
    # Reports any markdown link in docs/ that resolves to a
    # missing file, and any path-shaped reference to source
    # code (internal/...go, pkg/...go, cmd/...go, api/openapi.yaml,
    # deploy/, scripts/, .github/workflows/, docs/adr/NNNN-...)
    # that no longer points at a real file. A trailing
    # `<!-- stale-ok: <reason> -->` comment on a line
    # suppresses that single finding; ADR/, triz-report.md,
    # and CHANGELOG.md are excluded from the source-ref scan
    # because they are historical documents.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: docs-check
        run: make docs-check

  docs-lint:
    # OPS-CI-3: keep markdownlint + vale as a soft gate on
    # docs/. The default configs (.markdownlint.json + .vale.ini)
    # are permissive — they catch structural issues (heading
    # order, broken links, line length) without nitpicking
    # prose. Operators who want stricter prose style can
    # add custom .vale/styles/.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            docs/**/*.md
            README.md
            CHANGELOG.md

      - name: vale
        uses: errata-ai/vale-action@reviewdog
        with:
          files: |
            docs
            README.md
            CHANGELOG.md
          args: "--config=.vale.ini --minAlertLevel=error"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: Lint Helm chart
        # Tier 2.42: helm lint catches Chart.yaml issues, missing
        # templates, and template rendering problems at build time
        # before they hit a real cluster.
        run: helm lint deploy/helm/promptsheon/

      - name: Validate rendered manifests with kubeconform
        # OPS-HELM-2: kubeconform checks the rendered manifest
        # against the Kubernetes OpenAPI schema. We render
        # twice (default + vault) and validate each. kubeconform
        # is the successor to the now-archived kubeval; the
        # invocation is a single-shot, no server required.
        run: |
          set -e
          helm template render-defaults deploy/helm/promptsheon/ > /tmp/render-defaults.yaml
          helm template render-vault deploy/helm/promptsheon/ \
            --set vault.enabled=true \
            --set vault.key=$(printf '%064x' 1) > /tmp/render-vault.yaml
          docker run --rm \
            -v /tmp:/tmp:ro \
            ghcr.io/yannh/kubeconform:latest-alpine \
            -strict -summary /tmp/render-defaults.yaml
          docker run --rm \
            -v /tmp:/tmp:ro \
            ghcr.io/yannh/kubeconform:latest-alpine \
            -strict -summary /tmp/render-vault.yaml

      - name: Render with defaults (sqlite)
        # Helm template exercise validates that every template
        # evaluates successfully. SQLite is the only backend; the
        # values schema rejects dbBackend=postgres and replicaCount>1.
        run: |
          helm template render-defaults deploy/helm/promptsheon/ \
            > /tmp/sqlite-rendered.yaml
          test -s /tmp/sqlite-rendered.yaml

      - name: Render with vault Secret enabled
        run: |
          helm template render-vault deploy/helm/promptsheon/ \
            --set vault.enabled=true \
            --set vault.key=$(printf '%064x' 1) \
            > /tmp/vault-rendered.yaml
          grep -q "kind: Secret" /tmp/vault-rendered.yaml
          grep -q "PROMPTSHEON_VAULT_KEY" /tmp/vault-rendered.yaml

      - name: Render must reject replicaCount=3
        run: |
          if helm template render-fail deploy/helm/promptsheon/ --set replicaCount=3 2>/dev/null; then
            echo "schema should have rejected replicaCount=3"; exit 1
          fi

      - name: Render must reject dbBackend=postgres
        run: |
          if helm template render-fail deploy/helm/promptsheon/ --set config.dbBackend=postgres 2>/dev/null; then
            echo "schema should have rejected dbBackend=postgres"; exit 1
          fi

      - name: Render must reject auth=false without insecureLoopback
        run: |
          if helm template render-fail deploy/helm/promptsheon/ --set config.auth=false 2>/dev/null; then
            echo "schema should have rejected auth=false without insecureLoopback"; exit 1
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.5"
          cache: true

      - name: Run govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Run gosec
        uses: securego/gosec@v2.28.0
        with:
          args: ./...

  release-config:
    # OSS-REL-2: every PR must pass `goreleaser check` so an
    # invalid .goreleaser.yml (missing field, deprecated key,
    # unknown top-level section) is caught before a tag push.
    # The job runs against the release tag matrix version so
    # a future goreleaser major bump is also detected.
    # `check` does NOT build, publish, or sign — see the
    # `build-release` job for the publishing path.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          install-only: true

      - name: Validate .goreleaser.yml
        run: goreleaser check

  sbom:
    runs-on: ubuntu-latest
    needs: [test, lint, security, release-config]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: "latest"

      - name: Generate SBOM
        run: |
          syft dir:. -o spdx-json=sbom.spdx.json -o cyclonedx-json=sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json

  build-release:
    runs-on: ubuntu-latest
    needs: [test, lint, security, sbom]
    if: startsWith(github.ref, 'refs/tags/')
    # Release jobs need write access to GHCR (packages:write),
    # an OIDC token for cosign keyless signing
    # (id-token:write), and the ability to publish GitHub
    # artifact attestations (attestations:write). The
    # workflow-level default is `contents: read`; per-job
    # overrides here are the minimum required.
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.5"
          cache: true

      - name: Download SBOM
        uses: actions/download-artifact@v7
        with:
          name: sbom
          path: ./dist/sbom

      - name: Log in to GHCR
        # GoReleaser pushes the multi-arch image to GHCR via
        # the docker_images stanza in .goreleaser.yml. The
        # login step uses the workflow GITHUB_TOKEN; the
        # `packages: write` permission above is what grants
        # the token the ability to push images.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        # SEC-16a: cosign is invoked by the `signs:` block in
        # .goreleaser.yml for keyless (Sigstore Fulcio) signing
        # of every release artefact and the checksum file.
        # The runner image does not ship cosign; install the
        # pinned major version from the official installer.
        uses: sigstore/cosign-installer@v4
        with:
          cosign-version: v2.x

      - name: Run GoReleaser
        # Sequenced before the attestation step so the
        # attestations can pin the exact binary digests.
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release binaries
        # SEC-16c: emit a GitHub artifact attestation for
        # every binary GoReleaser produced. The previous
        # build-release job called slsa-framework/slsa-
        # github-generator as a reusable step, which is the
        # wrong call shape (the SLSA generator is intended
        # to drive a build, not attest an external one). The
        # official `actions/attest-build-provenance` action
        # is the supported path for attesting artefacts
        # produced by an external build. The subject-path
        # below mirrors the actual archives GoReleaser
        # emits at the repo root of `dist/`; no SBOM .sig /
        # .pem files exist there (the .goreleaser.yml
        # `signs:` block signs archives and the checksum
        # next to themselves, not the SBOM).
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/promptsheond_*.tar.gz
            dist/promptsheond_*.zip
            dist/promptsheon_*.tar.gz
            dist/promptsheon_*.zip
            dist/checksums.txt
